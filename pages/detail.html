<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Detalle del destino — ViajaYa" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400;1,6..72,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.scss" />
    <title>ViajaYa — Destino</title>
    <script type="module" src="/src/detail.ts"></script>
  </head>
  <body class="page-detail">
    <div id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <header class="navbar" data-navbar>
      <div class="navbar__inner">
        <a href="/index.html" class="navbar__logo">ViajaYa</a>
        <button
          type="button"
          class="navbar__toggle"
          data-nav-trigger
          aria-expanded="false"
          aria-controls="nav-drawer"
          aria-label="Abrir menú"
        >
          <span class="material-symbols-outlined" aria-hidden="true">menu</span>
        </button>
        <nav class="navbar__menu" aria-label="Principal">
          <a href="/index.html">Inicio</a>
          <a href="/pages/destinations.html">Destinos</a>
          <a href="/pages/quote.html">Cotizar</a>
          <a href="/pages/contact.html">Contacto</a>
        </nav>
        <div class="navbar__actions">
          <button type="button" class="navbar__icon-btn" data-theme-toggle aria-label="Cambiar tema">
            <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
          </button>
          <a href="/pages/reservations.html" class="navbar__icon-btn" aria-label="Mis viajes guardados">
            <span class="material-symbols-outlined" aria-hidden="true">bookmark</span>
            <span class="navbar__badge" data-res-badge></span>
          </a>
        </div>
      </div>
    </header>
    <button type="button" class="nav-overlay" data-nav-overlay hidden aria-hidden="true"></button>
    <nav id="nav-drawer" class="nav-drawer" data-nav-drawer aria-hidden="true" aria-label="Menú móvil">
      <ul class="nav-drawer__list">
        <li><a href="/index.html">Inicio</a></li>
        <li><a href="/pages/destinations.html">Destinos</a></li>
        <li><a href="/pages/quote.html">Cotizar</a></li>
        <li><a href="/pages/contact.html">Contacto</a></li>
        <li><a href="/pages/reservations.html">Mis viajes</a></li>
      </ul>
    </nav>

    <main class="page-main" data-detail-root>
      <section class="empty-state" data-not-found hidden>
        <span class="material-symbols-outlined" aria-hidden="true">travel_explore</span>
        <h1>Destino no encontrado</h1>
        <p class="small">Revisá el enlace o volvé al listado.</p>
        <a href="/pages/destinations.html" class="btn btn--primary">Ver destinos</a>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p class="site-footer__copy">© <span data-footer-year></span> ViajaYa</p>
        <div class="site-footer__links">
          <a href="#">Legal</a>
          <a href="#">Privacidad</a>
          <a href="/pages/contact.html">Contacto</a>
          <a href="/pages/destinations.html">Destinos</a>
        </div>
      </div>
    </footer>

    <template id="tpl-dolar">
      <div class="dolar-grid">
        <article class="dolar-card dolar-card--loading" data-dolar-card data-dolar="oficial">
          <p class="dolar-card__title">Dólar oficial</p>
          <div class="dolar-card__skeleton"></div>
          <div class="dolar-card__skeleton dolar-card__skeleton--short"></div>
        </article>
        <article class="dolar-card dolar-card--loading" data-dolar-card data-dolar="blue">
          <p class="dolar-card__title">Dólar blue</p>
          <div class="dolar-card__skeleton"></div>
          <div class="dolar-card__skeleton dolar-card__skeleton--short"></div>
        </article>
        <article class="dolar-card dolar-card--loading" data-dolar-card data-dolar="bolsa">
          <p class="dolar-card__title">Dólar MEP</p>
          <div class="dolar-card__skeleton"></div>
          <div class="dolar-card__skeleton dolar-card__skeleton--short"></div>
        </article>
      </div>
    </template>
  </body>
</html>
